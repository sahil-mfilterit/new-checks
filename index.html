<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Verification</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
    padding-top:40px;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

.card{
    width:120px;
    height:120px;
    background:#222;
    border:2px solid #444;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    cursor:pointer;
    user-select:none;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
    background:#333;
}

button{
    padding:12px 20px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#00aa66;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:30px;
    font-size:20px;
}
</style>
</head>
<body>

<h1>Human Verification</h1>

<button onclick="startChallenge()">
Confirm
</button>

<div class="container" id="cards"></div>

<div id="result"></div>

<script>

const synth = window.speechSynthesis;

let correctNumber = null;
let challengeStart = 0;

function shuffle(arr){
    return arr.sort(() => Math.random() - 0.5);
}

function generateNumbers(){

    const nums = [];

    while(nums.length < 3){
        const n = Math.floor(Math.random() * 90) + 10;

        if(!nums.includes(n)){
            nums.push(n);
        }
    }

    return nums;
}

function speak(text){

    const utter = new SpeechSynthesisUtterance(text);

    utter.rate = 0.9;
    utter.pitch = 1;
    utter.volume = 1;

    synth.speak(utter);
}

function startChallenge(){

    document.getElementById("result").innerHTML = "";

    const numbers = generateNumbers();

    correctNumber =
        numbers[Math.floor(Math.random() * numbers.length)];

    const shuffled = shuffle([...numbers]);

    const cards = document.getElementById("cards");

    cards.innerHTML = "";

    shuffled.forEach(num => {

        const div = document.createElement("div");

        div.className = "card";
        div.innerText = num;

        div.onclick = (e) => {

            const reaction =
                performance.now() - challengeStart;

            const rect = div.getBoundingClientRect();

            const tapData = {
                tapped: num,
                expected: correctNumber,
                correct: num === correctNumber,
                reactionTimeMs: Math.round(reaction),
                x: Math.round(rect.left),
                y: Math.round(rect.top),
                timestamp: Date.now()
            };

            console.log("Tap Data:", tapData);

            if(num === correctNumber){

                document.getElementById("result")
                    .innerHTML =
                    "✅ Correct Human Response";

            }else{

                document.getElementById("result")
                    .innerHTML =
                    "❌ Wrong Selection";
            }
        };

        cards.appendChild(div);
    });

    challengeStart = performance.now();

    speak("Tap number " + correctNumber);
}

</script>

</body>
</html>
